name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF##*/v}"
          FILE="$(cat VERSION | tr -d ' \t\n\r')"
          if [[ "$TAG" != "$FILE" ]]; then
            echo "Tag v$TAG does not match VERSION file ($FILE)" >&2
            exit 1
          fi

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-airsink-deps-v1

      - name: Install dependencies
        run: |
          brew update
          brew install cmake pkg-config gstreamer libplist openssl@3 create-dmg

      - name: Build patched uxplay
        run: ./vendor/build_uxplay.sh

      - name: Build app
        run: ./scripts/build-app.sh

      - name: Make DMG
        run: ./scripts/make-dmg.sh

      - name: Compute checksums
        id: sums
        run: |
          DMG=$(ls build/*.dmg)
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sums.outputs.dmg }}
          generate_release_notes: true
          body: |
            ## AirSink ${{ github.ref_name }}

            **DMG sha256:** `${{ steps.sums.outputs.sha }}`

            ### Install
            - Drag `AirSink.app` from the DMG into `/Applications`.
            - First launch: right-click → Open (binary is ad-hoc signed; not Apple-notarised).
            - Or via Homebrew: `brew tap maslyankov/airsink && brew install --cask airsink`.
